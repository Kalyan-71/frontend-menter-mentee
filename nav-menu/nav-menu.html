<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Example - Mentor Mentee</title>
    <link rel="stylesheet" href="../utils/toast.css">
    <link rel="stylesheet" href="./nav-menu.css">
</head>
<body>
    <!-- Main Navigation Bar -->
    <nav class="main-navbar">
        <div class="navbar-container">
            <!-- Brand/Logo -->
            <a href="./mentor-dashboard.html" class="navbar-brand">
                <div class="navbar-logo">L</div>
                <span class="navbar-title">Mentor - Mentee</span>
            </a>

            <!-- Mobile Menu Toggle -->
            <button class="mobile-menu-toggle" onclick="toggleMobileMenu()">☰</button>

            <!-- Navigation Menu -->
            <ul class="nav-menu" id="navMenu">
                <!-- Links will be dynamically loaded based on role -->
            </ul>

            <!-- User Menu -->
            <div class="user-menu">
                <span class="role-badge" id="roleBadge">User</span>
                <div class="user-profile" onclick="toggleDropdown(event)">
                    <div class="user-avatar">JD</div>
                    <span class="user-name">John Doe</span>
                    <span class="dropdown-arrow">▼</span>
                </div>

                <!-- Dropdown Menu -->
                <div class="dropdown-menu" id="dropdownMenu">
                    <a href="./profile.html" class="dropdown-item">
                        <span>👤</span>
                        <span>My Profile</span>
                    </a>
                    <a href="./settings.html" class="dropdown-item">
                        <span>⚙️</span>
                        <span>Settings</span>
                    </a>
                    <div class="dropdown-divider"></div>
                    <a href="#" class="dropdown-item" onclick="event.preventDefault(); alert('Help & Support')">
                        <span>❓</span>
                        <span>Help & Support</span>
                    </a>
                    <a href="#" class="dropdown-item" onclick="event.preventDefault(); alert('Report Issue')">
                        <span>🐛</span>
                        <span>Report an Issue</span>
                    </a>
                    <div class="dropdown-divider"></div>
                    <a href="#" class="dropdown-item danger" onclick="event.preventDefault(); logout()">
                        <span>🚪</span>
                        <span>Logout</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>
